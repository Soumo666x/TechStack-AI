<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStack AI - Indian Startup Stack Recommender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --bg-dark: #0f172a;
            --bg-light: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #475569;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1f3a 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .input-section {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 2px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:hover {
            border-color: var(--primary);
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        button {
            flex: 1;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            background: var(--bg-light);
        }

        .results-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-header {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .confidence-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-card);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            border: 2px solid var(--border);
        }

        .confidence-score {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .contrarian-badge {
            background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
            border-color: var(--primary);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        .card-icon {
            font-size: 1.5rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-content {
            color: var(--text-secondary);
        }

        .tech-item {
            margin-bottom: 0.75rem;
        }

        .tech-name {
            font-weight: 600;
            color: var(--primary);
            font-size: 1.05rem;
        }

        .tech-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .alert {
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border-left: 4px solid;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
            color: var(--text-primary);
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .alert-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .reasoning-box {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            margin-bottom: 2rem;
        }

        .cost-breakdown {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .cost-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .cost-item:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent);
        }

        .reference-card {
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--bg-card) 100%);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .reference-startup {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .reference-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .reference-link:hover {
            text-decoration: underline;
        }

        .reference-insight {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-style: italic;
            color: var(--text-muted);
        }

        .timeline {
            position: relative;
            padding-left: 2rem;
            margin: 1.5rem 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary), var(--accent));
        }

        .timeline-item {
            position: relative;
            padding-bottom: 1.5rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2.375rem;
            top: 0.25rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            border: 3px solid var(--bg-dark);
        }

        .timeline-stage {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .timeline-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn-copy {
            background: var(--success);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
        }

        .alternative-section {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 2rem;
            border: 2px dashed var(--border);
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .input-grid {
                grid-template-columns: 1fr;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .results-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--success);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 TechStack AI</h1>
            <p class="subtitle">India's Smart Tech Stack Recommender for Startups</p>
        </header>

        <div class="input-section">
            <div class="input-grid">
                <div class="input-group">
                    <label for="stage">Startup Stage</label>
                    <select id="stage">
                        <option value="idea">💡 Idea Stage</option>
                        <option value="mvp">🛠️ MVP / Pre-Seed</option>
                        <option value="growth">📈 Growth / Series A</option>
                        <option value="scale">🌍 Scale / Series B+</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="team">Team Size</label>
                    <select id="team">
                        <option value="solo">1-5 (Solo/Small)</option>
                        <option value="medium">6-15 (Medium)</option>
                        <option value="large">15+ (Large)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="budget">Monthly Budget</label>
                    <select id="budget">
                        <option value="low">Low (₹5K - ₹25K)</option>
                        <option value="medium">Medium (₹25K - ₹1L)</option>
                        <option value="high">High (₹1L+)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="sector">Sector</label>
                    <select id="sector">
                        <option value="fintech">💰 Fintech</option>
                        <option value="healthtech">🏥 Healthtech</option>
                        <option value="edtech">📚 Edtech</option>
                        <option value="saas">☁️ SaaS</option>
                        <option value="ecommerce">🛒 E-commerce</option>
                        <option value="ai">🤖 AI/ML</option>
                    </select>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-primary" onclick="generateRecommendation()">Generate Stack Recommendation</button>
                <button class="btn-secondary" onclick="resetForm()">Reset</button>
            </div>
        </div>

        <div class="results-section" id="results">
            <!-- Results will be rendered here -->
        </div>
    </div>

                stack.condition.sector === sector
            );

            // If no exact match, try stage + sector match
            if (!match) {
                match = stackDatabase.find(stack => 
                    stack.condition.stage === stage &&
                    stack.condition.sector === sector
                );
            }

            // If still no match, try sector match
            if (!match) {
                match = stackDatabase.find(stack => 
                    stack.condition.sector === sector
                );
            }

            return match || defaultStack;
        }

        function generateRecommendation() {
            const stage = document.getElementById('stage').value;
            const team = document.getElementById('team').value;
            const budget = document.getElementById('budget').value;
            const sector = document.getElementById('sector').value;

            const recommendation = findRecommendation(stage, budget, sector);
            renderResults(recommendation, { stage, team, budget, sector });

            // Scroll to results
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        function copyReport() {
            const resultsSection = document.getElementById('results');
            const text = resultsSection.innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ Report copied to clipboard!');
            }).catch(err => {
                showToast('❌ Failed to copy report');
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function resetForm() {
            document.getElementById('stage').selectedIndex = 0;
            document.getElementById('team').selectedIndex = 0;
            document.getElementById('budget').selectedIndex = 0;
            document.getElementById('sector').selectedIndex = 0;
            
            const resultsSection = document.getElementById('results');
            resultsSection.style.display = 'none';
        }

        function getStageName(stage) {
            const stages = {
                'idea': '💡 Idea Stage',
                'mvp': '🛠️ MVP',
                'growth': '📈 Growth',
                'scale': '🌍 Scale'
            };
            return stages[stage] || stage;
        }

        function getTeamName(team) {
            const teams = {
                'solo': '1-5 people',
                'medium': '6-15 people',
                'large': '15+ people'
            };
            return teams[team] || team;
        }

        function getBudgetName(budget) {
            const budgets = {
                'low': '₹5K-₹25K',
                'medium': '₹25K-₹1L',
                'high': '₹1L+'
            };
            return budgets[budget] || budget;
        }

        function getSectorName(sector) {
            const sectors = {
                'fintech': 'Fintech',
                'healthtech': 'Healthtech',
                'edtech': 'Edtech',
                'saas': 'SaaS',
                'ecommerce': 'E-commerce',
                'ai': 'AI/ML'
            };
            return sectors[sector] || sector;
        }
    </script>
